pr: none
trigger: none

pool: pins-odt-agent-pool

variables:
  - group: pipeline_secrets

resources:
  repositories:
    - repository: templates
      type: github
      endpoint: Planning-Inspectorate
      name: Planning-Inspectorate/common-pipeline-templates
      ref: f4060b3bf79e8df7c4988e2309625bb591295a20

jobs:
  - job: purge
    displayName: Cleanup Container Registry Images
    steps:
      - checkout: self
      - checkout: templates
      - script: |
          sudo apt-get install -y powershell
          echo "ls sources"
          ls $(Build.SourcesDirectory)
          echo "ls sources/common-pipeline-templates"
          ls $(Build.SourcesDirectory)/common-pipeline-templates
        displayName: 'Install PowerShell'
      - template: steps/azure_auth.yml@templates
        parameters:
          subscriptionId: edb1ff78-90da-4901-a497-7e79f966f8e2
      - template: steps/acr_purge.yml@templates
    workspace:
      clean: all
