pr: none
trigger: none

pool: pins-odt-agent-pool

variables:
  - group: pipeline_secrets

resources:
  repositories:
    - repository: templates
      type: github
      endpoint: Planning-Inspectorate
      name: Planning-Inspectorate/common-pipeline-templates
      ref: 66d13af07913d5c7175dcabe37573f83446e821c

jobs:
  - job: purge
    displayName: Cleanup Container Registry Images
    steps:
      - checkout: templates
      - script: |
          sudo apt-get install -y powershell
          echo "ls buildDir"
          ls $(Agent.BuildDirectory)
          echo "ls buildDir/s"
          ls $(Agent.BuildDirectory)/s
          echo "ls buildDir/s/templates"
          ls $(Agent.BuildDirectory)/s/templates
        displayName: 'Install PowerShell'
      - template: steps/azure_auth.yml@templates
        parameters:
          subscriptionId: edb1ff78-90da-4901-a497-7e79f966f8e2
      - template: steps/acr_purge.yml@templates
    workspace:
      clean: all
