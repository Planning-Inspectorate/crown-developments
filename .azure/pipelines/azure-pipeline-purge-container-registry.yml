parameters:
  - name: keepLastXDays
    displayName: Keep Last X Days
    type: number
    default: 30
  - name: dryRun
    displayName: Dry Run (don't delete)
    type: boolean
    default: false

pr: none
trigger: none

# uncomment for running on weekly schedule
# schedules:
#   - cron: "0 7 * * 1"
#     displayName: Monday 07:00 Cleanup
#     branches:
#       include:
#       - main

pool: pins-odt-agent-pool

variables:
  - group: pipeline_secrets

resources:
  repositories:
    - repository: templates
      type: github
      endpoint: Planning-Inspectorate
      name: Planning-Inspectorate/common-pipeline-templates
      ref: acdff52a12d62b8dea4d183f0cffcea4d81dcc23

jobs:
  - job: purge
    displayName: Cleanup Container Registry Images
    steps:
      - checkout: self
      - checkout: templates
      - script: |
          sudo apt-get install -y powershell
        displayName: 'Install PowerShell'
      - template: steps/azure_auth.yml@templates
        parameters:
          subscriptionId: edb1ff78-90da-4901-a497-7e79f966f8e2
      - template: steps/azure_container_registry_purge.yml@templates
        parameters:
          dryRun: ${{ parameters.dryRun }}
          keepLastXDays: ${{ parameters.keepLastXDays }}
          repositories: "['crown/manage', 'crown/portal']"
          resourceGroupsBySub: >
            {
              "dev": ["pins-rg-crown-dev"],
              "test": ["pins-rg-crown-test"],
              "training": ["pins-rg-crown-training"],
              "prod": ["pins-rg-crown-prod"]
            }
    workspace:
      clean: all
